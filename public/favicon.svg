<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background circle with gradient effect -->
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#AEC6E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E6F0FF;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Main background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#bgGradient)" stroke="#D1E7FF" stroke-width="0.5"/>
  
  <!-- Brain icon in center -->
  <g transform="translate(16, 16)">
    <!-- Brain outline -->
    <path d="M-4,-6 C-6,-4 -6,-2 -6,0 C-6,2 -5,4 -3,5 C-2,6 -1,6 0,6 C1,6 2,6 3,5 C5,4 6,2 6,0 C6,-2 6,-4 4,-6 C2,-7 0,-7 -2,-7 C-3,-7 -4,-6 -4,-6 Z" 
          fill="#3366CC" stroke="none"/>
    
    <!-- Brain hemispheres division -->
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#1E4A8C" stroke-width="0.3"/>
    
    <!-- Brain folds/gyri -->
    <path d="M-3,-3 C-4,-2 -4,-1 -3,0" fill="none" stroke="#1E4A8C" stroke-width="0.4"/>
    <path d="M-2,-4 C-3,-3 -3,-2 -2,-1" fill="none" stroke="#1E4A8C" stroke-width="0.4"/>
    <path d="M3,-3 C4,-2 4,-1 3,0" fill="none" stroke="#1E4A8C" stroke-width="0.4"/>
    <path d="M2,-4 C3,-3 3,-2 2,-1" fill="none" stroke="#1E4A8C" stroke-width="0.4"/>
    <path d="M-3,1 C-4,2 -4,3 -3,4" fill="none" stroke="#1E4A8C" stroke-width="0.4"/>
    <path d="M3,1 C4,2 4,3 3,4" fill="none" stroke="#1E4A8C" stroke-width="0.4"/>
  </g>
</svg>







